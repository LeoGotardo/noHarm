<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NoHarm — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900&family=Manrope:wght@400;500;600;700;800&family=Spectral:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #e9e7e1;
    font-family: 'Figtree', system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  #stage { display: flex; align-items: center; justify-content: center; width: 100vw; height: 100vh; }
  img { -webkit-user-drag: none; }
  button { font-family: inherit; }

  /* ── Theme tokens ─────────────────────────────────────── */
  .nh-root {
    --font-body: 'Figtree', system-ui, sans-serif;
    --font-display: 'Figtree', system-ui, sans-serif;
    --display-weight: 800;
  }

  /* SAGE — light */
  .nh-root[data-dir="sage"][data-mode="light"] {
    --bg: oklch(0.972 0.008 140);
    --surface: oklch(0.995 0.004 140);
    --surface-2: oklch(0.955 0.012 140);
    --ink: oklch(0.30 0.022 155);
    --ink-2: oklch(0.47 0.022 155);
    --ink-3: oklch(0.63 0.018 155);
    --primary: oklch(0.585 0.075 156);
    --primary-soft: oklch(0.93 0.032 150);
    --on-primary: oklch(0.99 0.006 150);
    --accent: oklch(0.70 0.115 55);
    --accent-soft: oklch(0.93 0.04 60);
    --accent-ink: oklch(0.52 0.12 50);
    --border: oklch(0.91 0.01 150);
    --ring-track: oklch(0.92 0.018 150);
    --geo: oklch(0.585 0.075 156);
    --tabbar-bg: oklch(0.99 0.004 140 / 0.82);
    --tabbar-solid: oklch(0.985 0.005 140);
    --banner-bg: oklch(0.99 0.004 140 / 0.86);
    --toast-bg: oklch(0.30 0.022 155); --toast-ink: oklch(0.97 0.01 150);
    --font-body: 'Figtree', system-ui, sans-serif;
    --font-display: 'Figtree', system-ui, sans-serif;
    --display-weight: 800;
  }
  /* SAGE — dark */
  .nh-root[data-dir="sage"][data-mode="dark"] {
    --bg: oklch(0.215 0.016 158);
    --surface: oklch(0.262 0.018 158);
    --surface-2: oklch(0.31 0.02 158);
    --ink: oklch(0.95 0.012 140);
    --ink-2: oklch(0.78 0.016 145);
    --ink-3: oklch(0.62 0.016 150);
    --primary: oklch(0.74 0.09 157);
    --primary-soft: oklch(0.33 0.04 157);
    --on-primary: oklch(0.18 0.02 158);
    --accent: oklch(0.76 0.10 60);
    --accent-soft: oklch(0.34 0.05 55);
    --accent-ink: oklch(0.82 0.10 65);
    --border: oklch(0.34 0.016 158);
    --ring-track: oklch(0.33 0.018 158);
    --geo: oklch(0.74 0.09 157);
    --tabbar-bg: oklch(0.235 0.016 158 / 0.82);
    --tabbar-solid: oklch(0.235 0.016 158);
    --banner-bg: oklch(0.27 0.018 158 / 0.88);
    --toast-bg: oklch(0.95 0.012 140); --toast-ink: oklch(0.22 0.02 158);
    --font-body: 'Figtree', system-ui, sans-serif;
    --font-display: 'Figtree', system-ui, sans-serif;
    --display-weight: 800;
  }
  /* DAWN — light */
  .nh-root[data-dir="dawn"][data-mode="light"] {
    --bg: oklch(0.968 0.014 68);
    --surface: oklch(0.995 0.006 68);
    --surface-2: oklch(0.948 0.018 64);
    --ink: oklch(0.305 0.026 42);
    --ink-2: oklch(0.47 0.03 44);
    --ink-3: oklch(0.63 0.026 48);
    --primary: oklch(0.625 0.115 46);
    --primary-soft: oklch(0.93 0.038 56);
    --on-primary: oklch(0.99 0.01 60);
    --accent: oklch(0.66 0.10 30);
    --accent-soft: oklch(0.93 0.04 36);
    --accent-ink: oklch(0.54 0.12 32);
    --border: oklch(0.905 0.018 58);
    --ring-track: oklch(0.92 0.022 58);
    --geo: oklch(0.625 0.115 46);
    --tabbar-bg: oklch(0.99 0.006 68 / 0.82);
    --tabbar-solid: oklch(0.985 0.008 68);
    --banner-bg: oklch(0.99 0.006 68 / 0.86);
    --toast-bg: oklch(0.305 0.026 42); --toast-ink: oklch(0.97 0.012 60);
    --font-body: 'Manrope', system-ui, sans-serif;
    --font-display: 'Spectral', Georgia, serif;
    --display-weight: 700;
  }
  /* DAWN — dark */
  .nh-root[data-dir="dawn"][data-mode="dark"] {
    --bg: oklch(0.205 0.018 40);
    --surface: oklch(0.252 0.022 40);
    --surface-2: oklch(0.30 0.024 40);
    --ink: oklch(0.95 0.014 60);
    --ink-2: oklch(0.78 0.022 54);
    --ink-3: oklch(0.63 0.024 50);
    --primary: oklch(0.71 0.12 50);
    --primary-soft: oklch(0.33 0.05 46);
    --on-primary: oklch(0.18 0.02 40);
    --accent: oklch(0.70 0.11 34);
    --accent-soft: oklch(0.34 0.05 36);
    --accent-ink: oklch(0.80 0.11 38);
    --border: oklch(0.34 0.018 44);
    --ring-track: oklch(0.33 0.02 44);
    --geo: oklch(0.71 0.12 50);
    --tabbar-bg: oklch(0.23 0.018 40 / 0.82);
    --tabbar-solid: oklch(0.23 0.018 40);
    --banner-bg: oklch(0.265 0.022 40 / 0.88);
    --toast-bg: oklch(0.95 0.014 60); --toast-ink: oklch(0.21 0.02 40);
    --font-body: 'Manrope', system-ui, sans-serif;
    --font-display: 'Spectral', Georgia, serif;
    --display-weight: 700;
  }

  /* ── Shared animations ────────────────────────────────── */
  @keyframes nhFade { from { opacity: 0 } to { opacity: 1 } }
  @keyframes nhSheetIn { from { transform: translateY(100%) } to { transform: translateY(0) } }
  @keyframes nhBannerIn { from { transform: translateY(-130%); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
  @keyframes nhToastIn { from { transform: translate(-50%, 16px); opacity: 0 } to { transform: translate(-50%, 0); opacity: 1 } }
  @keyframes nhSpin { to { transform: rotate(360deg) } }
  @keyframes nhPop { 0% { transform: scale(0.6); opacity: 0 } 60% { transform: scale(1.12) } 100% { transform: scale(1); opacity: 1 } }
  @keyframes nhRise { from { transform: translateY(14px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
  @keyframes nhCheckRipple { from { transform: scale(0.3); opacity: 0.5 } to { transform: scale(2.4); opacity: 0 } }
  .nh-spin { animation: nhSpin .7s linear infinite; }
  .nh-shimmer {
    background: linear-gradient(100deg, var(--surface-2) 30%, var(--border) 50%, var(--surface-2) 70%);
    background-size: 220% 100%; animation: nhShimmer 1.3s ease-in-out infinite;
  }
  @keyframes nhShimmer { from { background-position: 180% 0 } to { background-position: -40% 0 } }
  .nh-rise { animation: nhRise .5s cubic-bezier(.2,.8,.3,1) both; }

  /* hide scrollbars inside the phone */
  .nh-scroll::-webkit-scrollbar { width: 0; height: 0; }
  .nh-scroll { scrollbar-width: none; }

  #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; color: #7a8a7a; font-size: 14px; }
</style>
</head>
<body>
  <div id="stage"><div id="loading">Loading NoHarm…</div></div>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#5b7d5b"/>
      <circle cx="50" cy="50" r="26" fill="none" stroke="#dce7dc" stroke-width="5"/>
      <path d="M40 50 L47 58 L62 42" fill="none" stroke="#dce7dc" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/geo.jsx"></script>
  <script type="text/babel" src="src/ui.jsx"></script>
  <script type="text/babel" src="src/screens_auth.jsx"></script>
  <script type="text/babel" src="src/screens_home.jsx"></script>
  <script type="text/babel" src="src/screens_friends.jsx"></script>
  <script type="text/babel" src="src/screens_chat.jsx"></script>
  <script type="text/babel" src="src/screens_badges.jsx"></script>
  <script type="text/babel" src="src/screens_profile.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
